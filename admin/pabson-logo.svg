<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="starGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circular background -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGradient)" stroke="#fff" stroke-width="3"/>
  
  <!-- Book symbol (left side) -->
  <g transform="translate(70, 80)">
    <path d="M -15 10 L -15 -20 Q -15 -25 -10 -25 L 5 -25 Q 10 -25 10 -20 L 10 10" 
          fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M -15 10 L -15 -20 Q -15 -25 -10 -25 L 5 -25 Q 10 -25 10 -20 L 10 10" 
          fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" transform="translate(20 0)"/>
    <line x1="-10" y1="-20" x2="5" y2="-20" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <line x1="-10" y1="0" x2="5" y2="0" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="-10" y1="8" x2="5" y2="8" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  </g>
  
  <!-- Star symbol (right side) -->
  <g transform="translate(130, 80)">
    <path d="M 0,-18 L 5.5,-5 L 19,-3 L 10,6 L 12,20 L 0,14 L -12,20 L -10,6 L -19,-3 L -5.5,-5 Z" 
          fill="url(#starGradient)" stroke="#fbbf24" stroke-width="1.5"/>
  </g>
  
  <!-- PABSON text at bottom -->
  <text x="100" y="155" font-family="Arial, sans-serif" font-size="18" font-weight="bold" 
        text-anchor="middle" fill="#fff" letter-spacing="1">PABSON</text>
  
  <!-- Decorative corner circles -->
  <circle cx="20" cy="20" r="4" fill="#fbbf24" opacity="0.6"/>
  <circle cx="180" cy="20" r="4" fill="#fbbf24" opacity="0.6"/>
  <circle cx="20" cy="180" r="4" fill="#fbbf24" opacity="0.6"/>
  <circle cx="180" cy="180" r="4" fill="#fbbf24" opacity="0.6"/>
</svg>